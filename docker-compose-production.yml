services:

  tg-ws-proxy:
    image: ghcr.io/audetv/tg-ws-proxy:latest
    environment:
      - TG_WS_PROXY_HOST=0.0.0.0
      - TG_WS_PROXY_PORT=1443
      - TG_WS_PROXY_DC_IPS=2:149.154.167.220 4:149.154.167.220
      - TG_WS_PROXY_SECRET=${TG_WS_PROXY_SECRET}
    deploy:
      placement:
        constraints: [ node.labels.worker == worker-1 ]
      restart_policy:
        condition: on-failure
      endpoint_mode: dnsrr
    networks:
      - rmq-net
      - tg-bot-net
      - svodd-network
      - monitoring-internal
      - traefik-public
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  tg-svodd-bot:
    image: ${REGISTRY}/tg-svodd-bot:${IMAGE_TAG}
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    networks:
      - rmq-net
      - tg-bot-net
      - svodd-network
      - monitoring-internal
      - traefik-public
    environment:
      APP_ENV: prod
      RABBIT_SERVER_URL: amqp://rmq
      RABBIT_EXCHANGE_NAME: ex1
      TG_CHAT_ID: "@svoddru"
      Q1: rabbit://q1
      TG_BOT_TOKEN_FILE: /run/secrets/tg_bot_token
      SENTRY_DSN_FILE: /run/secrets/sentry_dsn
      POSTGRES_HOST: ${APP_POSTGRES_HOST}
      POSTGRES_USER: ${APP_POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/app_db_password
      POSTGRES_DB: ${APP_POSTGRES_DB}
      QUOTE_MAX_WORDS: 40
      QUOTE_MAX_CHARS: 350
      MSG_MAX_CHARS: 4096
      # Новые переменные для MTProto прокси
      TG_WS_PROXY_ENABLED: "${TG_WS_PROXY_ENABLED:-true}"
      TG_WS_PROXY_ADDR: "${TG_WS_PROXY_ADDR:-tg-ws-proxy:1443}"
      TG_WS_PROXY_SECRET: ${TG_WS_PROXY_SECRET}
      # Telegram API Credentials (опционально)
      TG_APP_ID: "${TG_APP_ID:-2040}"
      TG_APP_HASH: "${TG_APP_HASH:-b18441a1ff607e10a989891a5462e627}"
    secrets:
      - tg_bot_token
      - sentry_dsn
      - app_db_password
    command: './tg-svodd-bot'
    deploy:
      placement:
        constraints: [ node.labels.worker == worker-1 ]
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.tg-svodd-bot.rule=Host(`tgbot.svodd.ru`)
        - traefik.http.services.tg-svodd-bot.loadBalancer.server.port=8081
        - traefik.http.middlewares.tg-svodd-bot-redirect.redirectRegex.regex=^(https?://)tgbot.svodd.ru/(.*)$$
        - traefik.http.middlewares.tg-svodd-bot-redirect.redirectRegex.replacement=$${1}tgbot.svodd.ru/$${2}
        - traefik.http.middlewares.tg-svodd-bot-redirect.redirectRegex.permanent=true
        - traefik.http.routers.tg-svodd-bot.middlewares=tg-svodd-bot-redirect,secure-headers
        - traefik.http.routers.tg-svodd-bot.entryPoints=https
        - traefik.http.routers.tg-svodd-bot.tls=true
        - traefik.http.routers.tg-svodd-bot.tls.certResolver=letsEncrypt

secrets:
  tg_bot_token:
    file: ${APP_TG_BOT_TOKEN_FILE}
  sentry_dsn:
    file: ${APP_SENTRY_DSN_FILE}
  app_db_password:
    file: ${APP_DB_PASSWORD_FILE}

networks:
  rmq-net:
    name: rmq-net
    external: true
  svodd-network:
    name: svodd-network
    external: true
  tg-bot-net:
    driver: overlay
  monitoring-internal:
    external: true
  traefik-public:
    name: traefik-public
    external: true